<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dr. Sultan Alshehri</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      max-width: 700px;
      text-align: center;
    }
    .profile-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 3px solid #0a66c2;
    }
    h1 { margin-bottom: 10px; color: #111; }
    h2 { color: #0a66c2; font-weight: normal; margin-bottom: 25px; }
    p { font-size: 20px; line-height: 1.8; color: #444; }
    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      background: #0a66c2;
      color: white;
      padding: 12px 25px;
      border-radius: 10px;
      font-size: 18px;
    }
    a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <img class="profile-img" src="sultan.png" alt="صورة الدكتور">
    <h1>Dr. Sultan Alshehri</h1>
    <h2>sultanshehri1.github.io</h2>
    <p>
      Interested in Artificial Intelligence,<br>
      Machine Learning, and Deep Learning.<br>
      Exploring how data shapes intelligent systems.
    </p>
    <a href="https://github.com/sultanshehri1" target="_blank">GitHub</a>
  </div>
</body>
</html>
